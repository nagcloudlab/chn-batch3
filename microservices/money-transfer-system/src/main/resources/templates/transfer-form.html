<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>MTS - Transfer Money</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f0f1a; --surface: #161625; --surface2: #1c1c30;
            --border: #2a2a45; --text: #e2e4f0; --text-dim: #8888a8;
            --green: #6ee7b7; --blue: #60a5fa; --purple: #a78bfa;
            --pink: #f472b6; --yellow: #fbbf24; --red: #f87171; --teal: #2dd4bf;
        }
        body {
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            padding: 100px 20px 40px;
        }
        .nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 10;
            display: flex; align-items: center; gap: 24px;
            padding: 16px 40px;
            background: rgba(15,15,26,0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }
        .nav a {
            color: var(--text-dim); text-decoration: none; font-size: 0.9rem;
            transition: color 0.2s;
        }
        .nav a:hover { color: var(--green); }
        .nav .logo {
            font-size: 1.4rem; font-weight: 800;
            background: linear-gradient(135deg, var(--green), var(--blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            margin-right: auto;
        }

        .form-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 24px;
            padding: 40px 36px; max-width: 520px; width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .form-card h1 {
            font-size: 1.8rem; font-weight: 800; margin-bottom: 4px;
            background: linear-gradient(135deg, var(--green), var(--blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .form-card .desc { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 32px; }

        .field { margin-bottom: 24px; }
        .field label {
            display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-dim);
            margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .field input {
            width: 100%; padding: 14px 18px; background: var(--bg); border: 1px solid var(--border);
            border-radius: 12px; color: var(--text); font-family: 'JetBrains Mono', monospace;
            font-size: 1rem; outline: none; transition: border-color 0.2s;
        }
        .field input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(110,231,183,0.1); }
        .field input.error { border-color: var(--red); }
        .field .error-msg {
            color: var(--red); font-size: 0.8rem; margin-top: 6px;
            display: flex; align-items: center; gap: 4px;
        }

        .btn-submit {
            width: 100%; padding: 16px; border: none; border-radius: 14px;
            background: linear-gradient(135deg, var(--green), var(--teal));
            color: var(--bg); font-family: 'Inter', sans-serif; font-size: 1rem; font-weight: 700;
            cursor: pointer; transition: all 0.3s; letter-spacing: 0.5px;
            margin-top: 8px;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(110,231,183,0.25); }
        .btn-submit:active { transform: translateY(0); }

        .alert-error {
            background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.3);
            border-radius: 14px; padding: 16px 20px; margin-bottom: 24px;
            color: var(--red); font-size: 0.9rem; display: flex; align-items: center; gap: 10px;
        }
        .alert-error .icon { font-size: 1.3rem; }

        .swap-icon {
            display: flex; justify-content: center; margin: -8px 0 16px;
        }
        .swap-btn {
            background: var(--surface2); border: 1px solid var(--border); border-radius: 50%;
            width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--text-dim); font-size: 1rem; transition: all 0.2s;
        }
        .swap-btn:hover { border-color: var(--green); color: var(--green); transform: rotate(180deg); }
    </style>
</head>
<body>

<div class="nav">
    <a href="/" class="logo">MTS</a>
    <a href="/transfer">Transfer</a>
    <a href="/transfer-history">History</a>
</div>

<div class="form-card">
    <h1>Transfer Money</h1>
    <p class="desc">Send funds between accounts securely</p>

    <!-- Error alert from exception handler -->
    <div class="alert-error" th:if="${errorMessage}">
        <span class="icon">&#9888;</span>
        <span th:text="${errorMessage}">Error message</span>
    </div>

    <form th:action="@{/transfer}" method="post" th:object="${transferRequest}">

        <div class="field">
            <label for="fromAccountNumber">From Account</label>
            <input type="text" id="fromAccountNumber" th:field="*{fromAccountNumber}"
                   placeholder="e.g. A001"
                   th:classappend="${#fields.hasErrors('fromAccountNumber')} ? 'error' : ''" />
            <div class="error-msg" th:if="${#fields.hasErrors('fromAccountNumber')}">
                <span>&#10007;</span> <span th:errors="*{fromAccountNumber}">error</span>
            </div>
        </div>

        <div class="swap-icon">
            <button type="button" class="swap-btn" onclick="swapAccounts()" title="Swap accounts">&#8645;</button>
        </div>

        <div class="field">
            <label for="toAccountNumber">To Account</label>
            <input type="text" id="toAccountNumber" th:field="*{toAccountNumber}"
                   placeholder="e.g. A002"
                   th:classappend="${#fields.hasErrors('toAccountNumber')} ? 'error' : ''" />
            <div class="error-msg" th:if="${#fields.hasErrors('toAccountNumber')}">
                <span>&#10007;</span> <span th:errors="*{toAccountNumber}">error</span>
            </div>
        </div>

        <div class="field">
            <label for="amount">Amount (INR)</label>
            <input type="number" step="0.01" min="0.01" id="amount" th:field="*{amount}"
                   placeholder="0.00"
                   th:classappend="${#fields.hasErrors('amount')} ? 'error' : ''" />
            <div class="error-msg" th:if="${#fields.hasErrors('amount')}">
                <span>&#10007;</span> <span th:errors="*{amount}">error</span>
            </div>
        </div>

        <button type="submit" class="btn-submit">Send Transfer</button>
    </form>
</div>

<script>
function swapAccounts() {
    const from = document.getElementById('fromAccountNumber');
    const to = document.getElementById('toAccountNumber');
    const temp = from.value;
    from.value = to.value;
    to.value = temp;
}
</script>

</body>
</html>
