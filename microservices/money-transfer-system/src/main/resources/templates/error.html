<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>MTS - Error</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f0f1a; --surface: #161625; --border: #2a2a45;
            --text: #e2e4f0; --text-dim: #8888a8; --red: #f87171;
            --green: #6ee7b7; --blue: #60a5fa;
        }
        body {
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 40px 20px;
        }
        .error-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 24px;
            padding: 48px 40px; max-width: 520px; width: 100%; text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .error-icon {
            width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 24px;
            background: rgba(248,113,113,0.15); border: 2px solid var(--red);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem;
        }
        .error-card h1 { font-size: 1.8rem; font-weight: 800; color: var(--red); margin-bottom: 12px; }
        .error-card p { color: var(--text-dim); margin-bottom: 8px; }
        .error-code { font-size: 3rem; font-weight: 800; color: var(--red); opacity: 0.3; margin-bottom: 16px; }
        .btn {
            display: inline-block; padding: 14px 28px; border-radius: 14px;
            background: linear-gradient(135deg, var(--green), var(--blue));
            color: var(--bg); font-weight: 700; text-decoration: none;
            transition: all 0.3s; margin-top: 24px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(110,231,183,0.25); }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-icon">&#9888;</div>
        <div class="error-code" th:text="${status}">500</div>
        <h1 th:text="${error}">Something went wrong</h1>
        <p th:text="${message}">An unexpected error occurred.</p>
        <a href="/" class="btn">Back to Home</a>
    </div>
</body>
</html>
