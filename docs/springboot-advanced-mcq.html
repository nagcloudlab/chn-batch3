<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spring Boot — Advanced Scenario MCQ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Ubuntu, sans-serif;
    background: #0f172a;
    color: #f1f5f9;
    min-height: 100vh;
    padding: 24px 16px;
    line-height: 1.6;
  }

  .container { max-width: 880px; margin: 0 auto; }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid #1e293b;
  }
  .logo { font-size: 18px; font-weight: 700; color: #60a5fa; letter-spacing: 0.01em; }
  .logo span { color: #94a3b8; font-weight: 500; }
  .progress-info { font-size: 13px; color: #94a3b8; font-variant-numeric: tabular-nums; }

  .progress-bar {
    height: 5px;
    background: #1e293b;
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #3b82f6, #10b981);
    width: 0%;
    transition: width 0.5s cubic-bezier(.22,1,.36,1);
  }

  .card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 14px;
    padding: 32px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  }

  .tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: #60a5fa;
    text-transform: uppercase;
    margin-bottom: 10px;
    background: rgba(96, 165, 250, 0.1);
    padding: 4px 10px;
    border-radius: 4px;
  }
  .tag.difficulty { background: rgba(245, 158, 11, 0.1); color: #fbbf24; margin-left: 6px; }

  .question-text {
    font-size: 18px;
    font-weight: 600;
    color: #f1f5f9;
    margin-bottom: 16px;
  }

  .scenario {
    font-size: 15px;
    color: #cbd5e1;
    margin-bottom: 16px;
  }
  .scenario + .scenario { margin-top: -8px; }

  pre {
    background: #0b1120;
    border: 1px solid #1e293b;
    border-radius: 8px;
    padding: 16px;
    overflow-x: auto;
    margin-bottom: 16px;
    font-family: "SF Mono", "JetBrains Mono", Consolas, Monaco, monospace;
    font-size: 13px;
    line-height: 1.55;
    color: #e2e8f0;
  }
  pre .k { color: #c084fc; }  /* keyword */
  pre .a { color: #fbbf24; }  /* annotation */
  pre .s { color: #86efac; }  /* string */
  pre .c { color: #64748b; font-style: italic; } /* comment */
  pre .t { color: #60a5fa; }  /* type */

  code.inline {
    background: #0b1120;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: "SF Mono", "JetBrains Mono", Consolas, monospace;
    font-size: 0.88em;
    color: #fbbf24;
    border: 1px solid #1e293b;
  }

  .options { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }

  .option {
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 14px 16px;
    cursor: pointer;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    transition: border-color 0.15s ease, background 0.15s ease, transform 0.1s ease;
    font-size: 15px;
    color: #e2e8f0;
    text-align: left;
    font-family: inherit;
    width: 100%;
  }
  .option:hover:not(.disabled) {
    border-color: #60a5fa;
    background: #172033;
  }
  .option:active:not(.disabled) { transform: scale(0.995); }

  .option-letter {
    font-weight: 700;
    color: #60a5fa;
    min-width: 22px;
    font-family: "SF Mono", Consolas, monospace;
  }
  .option-text { flex: 1; }
  .option-icon { font-weight: 700; font-size: 18px; margin-left: auto; opacity: 0; transition: opacity 0.2s; }

  .option.correct {
    border-color: #10b981;
    background: rgba(16, 185, 129, 0.08);
  }
  .option.correct .option-letter { color: #10b981; }
  .option.correct .option-icon { color: #10b981; opacity: 1; }

  .option.incorrect {
    border-color: #ef4444;
    background: rgba(239, 68, 68, 0.08);
  }
  .option.incorrect .option-letter { color: #ef4444; }
  .option.incorrect .option-icon { color: #ef4444; opacity: 1; }

  .option.disabled { cursor: default; }
  .option.dimmed { opacity: 0.5; }

  .explanation {
    margin-top: 18px;
    padding: 16px 20px;
    background: #0b1120;
    border-left: 3px solid #60a5fa;
    border-radius: 4px;
    font-size: 14px;
    color: #cbd5e1;
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: max-height 0.4s ease, opacity 0.3s ease, padding 0.3s ease, margin-top 0.3s ease;
    padding-top: 0;
    padding-bottom: 0;
    margin-top: 0;
  }
  .explanation.show {
    max-height: 900px;
    opacity: 1;
    padding: 16px 20px;
    margin-top: 18px;
  }
  .explanation-header {
    font-weight: 700;
    margin-bottom: 6px;
    color: #60a5fa;
    font-size: 13px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .explanation.correct { border-left-color: #10b981; }
  .explanation.correct .explanation-header { color: #10b981; }
  .explanation.incorrect { border-left-color: #ef4444; }
  .explanation.incorrect .explanation-header { color: #ef4444; }

  .actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 24px;
    gap: 12px;
  }

  .btn {
    background: #3b82f6;
    color: white;
    border: none;
    padding: 12px 28px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    font-family: inherit;
  }
  .btn:hover:not(:disabled) { background: #2563eb; }
  .btn:active:not(:disabled) { transform: scale(0.98); }
  .btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

  .btn-ghost {
    background: transparent;
    border: 1px solid #334155;
    color: #94a3b8;
  }
  .btn-ghost:hover:not(:disabled) { background: #1e293b; color: #f1f5f9; }

  /* Start screen */
  .start-screen { text-align: center; padding: 24px 20px; }
  .start-title { font-size: 32px; font-weight: 700; margin-bottom: 10px; color: #f1f5f9; }
  .start-subtitle { font-size: 15px; color: #94a3b8; margin-bottom: 32px; max-width: 560px; margin-left: auto; margin-right: auto; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 32px; }
  .stat { background: #0f172a; padding: 18px 12px; border-radius: 8px; border: 1px solid #334155; }
  .stat-value { font-size: 26px; font-weight: 700; color: #60a5fa; font-variant-numeric: tabular-nums; }
  .stat-label { font-size: 11px; text-transform: uppercase; color: #94a3b8; margin-top: 4px; letter-spacing: 0.1em; }

  .topic-list { text-align: left; background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 20px 24px; margin-bottom: 28px; }
  .topic-list-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: #94a3b8; margin-bottom: 12px; }
  .topic-list ul { list-style: none; display: grid; grid-template-columns: 1fr 1fr; gap: 8px 20px; font-size: 13px; color: #cbd5e1; }
  .topic-list li::before { content: "▸ "; color: #60a5fa; }

  /* Result screen */
  .result-screen { text-align: center; padding: 16px; }
  .score-big { font-size: 64px; font-weight: 800; margin: 20px 0 4px; font-variant-numeric: tabular-nums; }
  .score-big.high { color: #10b981; }
  .score-big.mid { color: #f59e0b; }
  .score-big.low { color: #ef4444; }
  .score-out-of { font-size: 18px; color: #64748b; margin-bottom: 8px; }
  .result-title { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  .result-summary { color: #94a3b8; margin-bottom: 24px; font-size: 14px; }
  .result-breakdown { text-align: left; background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 8px 20px; margin-bottom: 20px; max-height: 320px; overflow-y: auto; }
  .breakdown-item { padding: 10px 0; display: flex; justify-content: space-between; align-items: center; font-size: 13.5px; border-bottom: 1px solid #1e293b; gap: 12px; }
  .breakdown-item:last-child { border-bottom: none; }
  .breakdown-item .q-idx { color: #64748b; font-family: monospace; font-size: 12px; min-width: 28px; }
  .breakdown-item .q-title { color: #cbd5e1; flex: 1; }
  .breakdown-item .q-result { font-size: 18px; font-weight: 700; }
  .breakdown-item .q-result.ok { color: #10b981; }
  .breakdown-item .q-result.bad { color: #ef4444; }

  .keyboard-hint { text-align: center; margin-top: 20px; font-size: 12px; color: #475569; }
  .kbd { display: inline-block; background: #1e293b; border: 1px solid #334155; border-radius: 4px; padding: 2px 7px; font-family: monospace; font-size: 11px; color: #cbd5e1; margin: 0 2px; }

  @media (max-width: 640px) {
    body { padding: 16px 10px; }
    .card { padding: 20px; }
    .question-text { font-size: 16px; }
    .option { font-size: 14px; padding: 12px 14px; }
    pre { font-size: 11.5px; }
    .stats-grid { grid-template-columns: 1fr; }
    .topic-list ul { grid-template-columns: 1fr; }
    .start-title { font-size: 24px; }
    .score-big { font-size: 52px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">Spring Boot <span>/ Advanced Scenarios</span></div>
    <div class="progress-info" id="progressInfo">Ready</div>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div id="root"></div>

  <div class="keyboard-hint">
    <span class="kbd">1</span>–<span class="kbd">4</span> select · <span class="kbd">Enter</span> next · <span class="kbd">R</span> restart
  </div>
</div>

<script>
// ---------- DATA ----------
const QUESTIONS = [
  {
    topic: "Transactions · AOP Proxy",
    text: "Inside placeOrder(), if an exception is thrown AFTER notifyWarehouse() returns, what happens to the warehouse_log row?",
    code: `<span class="a">@Service</span>
<span class="k">public class</span> <span class="t">OrderService</span> {
  <span class="a">@Transactional</span>
  <span class="k">public void</span> placeOrder(<span class="t">Order</span> o) {
    save(o);
    notifyWarehouse(o); <span class="c">// internal call</span>
    <span class="k">throw new</span> <span class="t">RuntimeException</span>(<span class="s">"oops"</span>);
  }

  <span class="a">@Transactional</span>(propagation = <span class="t">Propagation</span>.REQUIRES_NEW)
  <span class="k">public void</span> notifyWarehouse(<span class="t">Order</span> o) { ... }
}`,
    options: [
      "Committed — REQUIRES_NEW forces a separate, independent transaction.",
      "Rolled back — the REQUIRES_NEW on notifyWarehouse() is ignored for internal calls.",
      "Compilation fails — you cannot mix propagations in one service.",
      "Committed only if the thrown exception is a checked exception."
    ],
    correct: 1,
    explanation: "Spring's <code class='inline'>@Transactional</code> is implemented via AOP proxies. Calling <code class='inline'>notifyWarehouse()</code> directly through <code class='inline'>this</code> bypasses the proxy, so <code class='inline'>REQUIRES_NEW</code> has no effect — both methods run in the same physical transaction, which rolls back. Fixes: inject self via <code class='inline'>@Lazy</code>, extract the method into a separate bean, or use <code class='inline'>TransactionTemplate</code>."
  },
  {
    topic: "Bean Scopes",
    text: "You want a fresh RequestContext per HTTP request. What actually happens here?",
    code: `<span class="a">@Component</span> <span class="a">@Scope</span>(<span class="s">"prototype"</span>)
<span class="k">class</span> <span class="t">RequestContext</span> { ... }

<span class="a">@RestController</span>
<span class="k">class</span> <span class="t">ReportController</span> {
  <span class="a">@Autowired</span> <span class="t">RequestContext</span> ctx;
}`,
    options: [
      "Each HTTP request gets a new RequestContext — prototype scope triggers per injection site.",
      "A single RequestContext is injected at startup and reused for every request.",
      "Spring throws BeanCreationException — prototype cannot be injected into a singleton.",
      "A new RequestContext is created on every method call of the controller."
    ],
    correct: 1,
    explanation: "The controller is a singleton; Spring resolves its dependencies <strong>once</strong>, at construction. The prototype is instantiated a single time and then cached inside the singleton. Fixes: <code class='inline'>@Scope(value=\"prototype\", proxyMode=TARGET_CLASS)</code>, inject an <code class='inline'>ObjectProvider&lt;RequestContext&gt;</code>, or use <code class='inline'>@Lookup</code>."
  },
  {
    topic: "Circular Dependencies",
    text: "ServiceA and ServiceB both use constructor injection and depend on each other. You start Spring Boot 3.x. Result?",
    options: [
      "Application starts — Spring silently creates uninitialized proxies.",
      "BeanCurrentlyInCreationException at startup.",
      "Works fine — Boot 3 re-enabled allow-circular-references by default.",
      "Silent NullPointerException on the first method call."
    ],
    correct: 1,
    explanation: "Since Spring Boot 2.6, circular references are <strong>disabled by default</strong>. Constructor injection cannot resolve cycles because Spring must have both beans fully constructed before injecting. Fixes, in order of preference: refactor the design (usually the real bug), <code class='inline'>@Lazy</code> on one side, or convert one to setter/field injection. Setting <code class='inline'>spring.main.allow-circular-references=true</code> works but is a code smell."
  },
  {
    topic: "Async · AOP Proxy",
    text: "@EnableAsync is on the main class. On which thread does sendEmail() run?",
    code: `<span class="a">@Service</span>
<span class="k">class</span> <span class="t">ReportService</span> {
  <span class="k">public void</span> generate() {
    sendEmail(); <span class="c">// internal call</span>
  }
  <span class="a">@Async</span>
  <span class="k">public void</span> sendEmail() { ... }
}`,
    options: [
      "A new thread from the default TaskExecutor.",
      "The caller thread — the proxy is bypassed, so @Async has no effect.",
      "Asynchronously, but only because @Async implicitly returns CompletableFuture.",
      "It fails to compile — @Async requires a return type."
    ],
    correct: 1,
    explanation: "Same proxy-bypass story as <code class='inline'>@Transactional</code>. <code class='inline'>@Async</code> works only when the method is invoked <strong>through the Spring proxy</strong> — i.e., from outside the bean. Internal <code class='inline'>this.sendEmail()</code> calls run synchronously on the caller thread. Fix: move <code class='inline'>sendEmail</code> to a separate bean, or self-inject."
  },
  {
    topic: "JPA · Lazy Loading",
    text: "The JSON response blows up with LazyInitializationException. What's the cleanest production-grade fix?",
    code: `<span class="a">@Entity</span>
<span class="k">class</span> <span class="t">Customer</span> {
  <span class="a">@OneToMany</span>(fetch = <span class="t">FetchType</span>.LAZY)
  <span class="k">private</span> <span class="t">List&lt;Order&gt;</span> orders;
}

<span class="a">@RestController</span>
<span class="k">class</span> <span class="t">CustomerController</span> {
  <span class="a">@GetMapping</span>(<span class="s">"/{id}"</span>)
  <span class="k">public</span> <span class="t">Customer</span> get(<span class="a">@PathVariable</span> <span class="t">Long</span> id) {
    <span class="k">return</span> repo.findById(id).orElseThrow();
  }
}`,
    options: [
      "Switch orders to FetchType.EAGER globally.",
      "Set spring.jpa.open-in-view=true so the session stays open.",
      "Return a DTO, populated inside a @Transactional service method.",
      "Add @Transactional on the controller method."
    ],
    correct: 2,
    explanation: "EAGER penalizes every query that doesn't need <code class='inline'>orders</code>. <code class='inline'>open-in-view=true</code> masks the issue and keeps DB connections open during view rendering — a known antipattern. <code class='inline'>@Transactional</code> on controllers leaks persistence into the web layer. The DTO pattern fetches exactly what the API needs inside the transaction and decouples persistence from API — the production answer."
  },
  {
    topic: "JPA · N+1",
    text: "Loading 100 Orders and accessing order.getItems() issues 101 SQL queries. Best fix?",
    options: [
      "Switch items to FetchType.EAGER.",
      "Write a JPQL query using JOIN FETCH, or apply @EntityGraph.",
      "Enable Hibernate second-level cache on Item.",
      "Increase the JDBC fetch size to 1000."
    ],
    correct: 1,
    explanation: "EAGER still runs N+1 in many providers — and hurts every query that doesn't need items. Second-level cache only helps on subsequent reads. Fetch size is a JDBC detail, unrelated. <code class='inline'>JOIN FETCH</code> or <code class='inline'>@EntityGraph</code> tell Hibernate to pull the association in a single SQL statement for that <strong>specific</strong> query — targeted and safe."
  },
  {
    topic: "Testing · Slices",
    text: "A controller test using @SpringBootTest takes 12 seconds because it starts Kafka, Redis, and JPA. You want to test only the web layer, fast.",
    options: [
      "@DataJpaTest — it's the lightest slice annotation.",
      "@WebMvcTest(OrderController.class) with @MockBean for service dependencies.",
      "@SpringBootTest(webEnvironment = MOCK) — it skips Tomcat.",
      "@ContextConfiguration pointing to an empty @Configuration class."
    ],
    correct: 1,
    explanation: "<code class='inline'>@WebMvcTest</code> loads <strong>only</strong> the web layer — controllers, filters, <code class='inline'>MockMvc</code>, Jackson, validators — and excludes JPA, Kafka, services. Collaborators are provided via <code class='inline'>@MockBean</code>. <code class='inline'>@DataJpaTest</code> is for repositories. <code class='inline'>MOCK</code> still loads the full context."
  },
  {
    topic: "Actuator · Exposure",
    text: "/actuator/health returns 200 in production, but /actuator/env returns 404. Config has management.endpoint.env.enabled=true. Why?",
    options: [
      "The env endpoint was removed in Spring Boot 3.",
      "Enabled ≠ exposed — you must add it to management.endpoints.web.exposure.include.",
      "Actuator requires Spring Security to expose anything beyond health.",
      "You need to add spring-boot-actuator-env as a separate starter."
    ],
    correct: 1,
    explanation: "<code class='inline'>enabled</code> controls whether the endpoint bean <strong>exists</strong>; <code class='inline'>exposure</code> controls whether it's <strong>reachable</strong> over HTTP/JMX. By default only <code class='inline'>health</code> is exposed over HTTP. Set <code class='inline'>management.endpoints.web.exposure.include=health,env,metrics</code> — or <code class='inline'>*</code> for all (behind auth in prod, please)."
  },
  {
    topic: "Configuration Properties",
    text: "In Spring Boot 3.x, what is the minimum additional step needed to make this bind?",
    code: `<span class="a">@ConfigurationProperties</span>(<span class="s">"app.mail"</span>)
<span class="k">public class</span> <span class="t">MailProps</span> {
  <span class="k">private final</span> <span class="t">String</span> host;
  <span class="k">private final</span> <span class="k">int</span> port;
  <span class="c">// constructor + getters only, no setters</span>
}`,
    options: [
      "Add setters for host and port — binding requires mutability.",
      "Register it via @EnableConfigurationProperties(MailProps.class) or @ConfigurationPropertiesScan.",
      "Add @ConstructorBinding — it is mandatory for immutable properties.",
      "Make the class @Component and add @Autowired on the constructor."
    ],
    correct: 1,
    explanation: "In Boot 3+, constructor binding is <strong>inferred automatically</strong> when the class has a single non-default constructor — <code class='inline'>@ConstructorBinding</code> is no longer required at class level. But <code class='inline'>@ConfigurationProperties</code> classes still need to be <strong>registered</strong> — via <code class='inline'>@EnableConfigurationProperties</code>, <code class='inline'>@ConfigurationPropertiesScan</code>, or by making them <code class='inline'>@Component</code>. Missing registration is the real bug here."
  },
  {
    topic: "HTTP Clients",
    text: "A service under load starts timing out calls to a downstream API. Thread dumps show many threads stuck in socket read. The code uses new RestTemplate(). The highest-impact fix is:",
    options: [
      "Migrate every call to WebClient and Mono<T>.",
      "Configure a pooled request factory (Apache HttpClient with PoolingHttpClientConnectionManager) and set connect/read timeouts.",
      "Wrap the call site in @Async so the web thread isn't blocked.",
      "Increase the server thread pool on the downstream API."
    ],
    correct: 1,
    explanation: "Default <code class='inline'>RestTemplate</code> uses <code class='inline'>SimpleClientHttpRequestFactory</code> — <strong>no connection pool, no timeouts, infinite waits</strong>. Under load you exhaust the file-descriptor/thread budget. The standard production fix is a pooled Apache HttpClient with explicit connect/read timeouts. WebClient is fine but a rewrite, not the fix for this symptom; <code class='inline'>@Async</code> just moves the blocking; the downstream server isn't the problem you identified."
  },
  {
    topic: "Exception Handling",
    text: "Two @ControllerAdvice classes both declare @ExceptionHandler(Exception.class). A global logging advice is running first and swallowing the exception before your business advice sees it. Fix?",
    options: [
      "Delete one — Spring only permits a single @ControllerAdvice per application.",
      "Use @Order on both advices; lower value = higher priority, runs first.",
      "Merge them — ordering across @ControllerAdvice beans is non-deterministic.",
      "Replace @Order with @Priority — @Order is ignored on advices."
    ],
    correct: 1,
    explanation: "Multiple <code class='inline'>@ControllerAdvice</code> beans are supported. Their order is determined by <code class='inline'>@Order</code> / <code class='inline'>Ordered</code> — <strong>lower value = runs first</strong>. Within a single advice, a more specific handler (<code class='inline'>BusinessException.class</code>) always beats a broader one (<code class='inline'>Exception.class</code>), but <strong>across</strong> advices you need explicit ordering."
  },
  {
    topic: "Profiles · Conditional Beans",
    text: "You start the app with spring.profiles.active=dev,qa. Which configuration is active?",
    code: `<span class="a">@Configuration</span> <span class="a">@Profile</span>(<span class="s">"dev"</span>)
<span class="k">class</span> <span class="t">DevDataSourceConfig</span> { <span class="a">@Bean</span> <span class="t">DataSource</span> ds() { ... } }

<span class="a">@Configuration</span> <span class="a">@Profile</span>(<span class="s">"!dev"</span>)
<span class="k">class</span> <span class="t">ProdDataSourceConfig</span> { <span class="a">@Bean</span> <span class="t">DataSource</span> ds() { ... } }`,
    options: [
      "Both register — startup fails with NoUniqueBeanDefinitionException.",
      "Only DevDataSourceConfig — '!dev' is false because 'dev' is among active profiles.",
      "Neither — 'dev,qa' isn't a recognized profile token.",
      "ProdDataSourceConfig wins because it's declared later."
    ],
    correct: 1,
    explanation: "<code class='inline'>@Profile(\"!dev\")</code> means <em>\"active when the set of active profiles does NOT contain 'dev'\"</em>. Since <code class='inline'>dev</code> IS active, that condition is <strong>false</strong>, so <code class='inline'>ProdDataSourceConfig</code> is excluded. <code class='inline'>DevDataSourceConfig</code> matches because <code class='inline'>dev</code> is active. Exactly one DataSource is registered — the design is correct."
  },
  {
    topic: "Transactions · Rollback Rules",
    text: "Will saveData() be rolled back when IOException escapes process()?",
    code: `<span class="a">@Transactional</span>

// ---------- STATE ----------
let current = 0;
let selected = null;
let answered = false;
const answers = new Array(QUESTIONS.length).fill(null); // stores selected index or null
let phase = "start"; // start | quiz | done

// ---------- RENDER ----------
const root = document.getElementById("root");
const progressFill = document.getElementById("progressFill");
const progressInfo = document.getElementById("progressInfo");

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function renderStart() {

  progressInfo.textContent = "Ready";
  root.innerHTML = `

      <div class="stats-grid">
        <div class="stat"><div class="stat-value">${QUESTIONS.length}</div><div class="stat-label">Questions</div></div>
        <div class="stat"><div class="stat-value">~35m</div><div class="stat-label">Duration</div></div>

          <li>Bean definition override</li>

          <li>HikariCP connection leaks</li>
          <li>@Scheduled &amp; @EnableAsync executors</li>
          <li>@TransactionalEventListener phases</li>
          <li>Spring Security filter chain</li>
          <li>ResponseStatusException resolution</li>
          <li>@Valid vs @Validated groups</li>
          <li>@Primary vs @Qualifier</li>
          <li>Micrometer @Timed setup</li>

        </ul>

function renderQuestion() {
  const q = QUESTIONS[current];
  const pct = ((current) / QUESTIONS.length) * 100;
  progressFill.style.width = pct + "%";
  progressInfo.textContent = `Question ${current + 1} of ${QUESTIONS.length}`;

  const codeBlock = q.code ? `<pre>${q.code}</pre>` : "";

  const optionsHtml = q.options.map((opt, i) => {
    const letter = String.fromCharCode(65 + i);
    return `<button class="option" data-idx="${i}" onclick="selectOption(${i})">
      <span class="option-letter">${letter}</span>
      <span class="option-text">${opt}</span>
      <span class="option-icon"></span>
    </button>`;
  }).join("");

  root.innerHTML = `
    <div class="card">
      <span class="tag">${q.topic}</span>
      <span class="tag difficulty">Advanced</span>
      <div class="question-text">${q.text}</div>
      ${codeBlock}
      <div class="options" id="optionsContainer">
        ${optionsHtml}
      </div>
      <div class="explanation" id="explanation"></div>
      <div class="actions">
        <button class="btn btn-ghost" onclick="restart()">Restart</button>
        <button class="btn" id="nextBtn" onclick="nextQuestion()" disabled>
          ${current === QUESTIONS.length - 1 ? "See Results" : "Next →"}
        </button>
      </div>
    </div>
  `;

  selected = null;
  answered = false;
}

function selectOption(idx) {
  if (answered) return;
  const q = QUESTIONS[current];
  selected = idx;
  answered = true;
  answers[current] = idx;

  const isCorrect = idx === q.correct;
  const options = document.querySelectorAll(".option");

  options.forEach((el, i) => {
    el.classList.add("disabled");
    if (i === q.correct) {
      el.classList.add("correct");
      el.querySelector(".option-icon").textContent = "✓";
    } else if (i === idx) {
      el.classList.add("incorrect");
      el.querySelector(".option-icon").textContent = "✕";
    } else {
      el.classList.add("dimmed");
    }
  });

  const exp = document.getElementById("explanation");
  exp.className = "explanation show " + (isCorrect ? "correct" : "incorrect");
  exp.innerHTML = `
    <div class="explanation-header">${isCorrect ? "✓ Correct" : "✕ Not quite"}</div>
    <div>${q.explanation}</div>
  `;

  document.getElementById("nextBtn").disabled = false;
}

function nextQuestion() {
  if (!answered) return;
  if (current === QUESTIONS.length - 1) {
    phase = "done";
    renderResult();
  } else {
    current++;
    renderQuestion();
  }
}

function renderResult() {
  const total = QUESTIONS.length;
  const correctCount = answers.reduce((acc, a, i) => acc + (a === QUESTIONS[i].correct ? 1 : 0), 0);
  const pct = Math.round((correctCount / total) * 100);
  progressFill.style.width = "100%";
  progressInfo.textContent = "Complete";

  let verdict, verdictClass, summary;
  if (pct >= 85) { verdict = "Excellent"; verdictClass = "high"; summary = "You've internalized the tricky proxy and config semantics. Ship it."; }
  else if (pct >= 60) { verdict = "Solid"; verdictClass = "mid"; summary = "Good grasp of the core ideas. Review the misses — they usually come from subtle Spring internals."; }
  else { verdict = "Keep Going"; verdictClass = "low"; summary = "These scenarios come up in production. Revisit the explanations — each miss is a real bug pattern to remember."; }

  const breakdown = QUESTIONS.map((q, i) => {
    const ok = answers[i] === q.correct;
    return `<div class="breakdown-item">
      <span class="q-idx">Q${String(i + 1).padStart(2, "0")}</span>
      <span class="q-title">${q.topic}</span>
      <span class="q-result ${ok ? "ok" : "bad"}">${ok ? "✓" : "✕"}</span>
    </div>`;
  }).join("");

  root.innerHTML = `
    <div class="card result-screen">
      <div class="result-title">${verdict}</div>
      <div class="score-big ${verdictClass}">${correctCount}<span style="font-size:0.5em;color:#64748b">/${total}</span></div>
      <div class="score-out-of">${pct}%</div>
      <div class="result-summary">${summary}</div>
      <div class="result-breakdown">${breakdown}</div>
      <div class="actions" style="justify-content:center;">
        <button class="btn" onclick="restart()">Retake Quiz</button>
      </div>
    </div>
  `;
}

function startQuiz() {
  phase = "quiz";
  current = 0;
  answers.fill(null);
  renderQuestion();
}

function restart() {
  phase = "start";
  current = 0;
  selected = null;
  answered = false;
  answers.fill(null);
  renderStart();
}

// ---------- KEYBOARD ----------
document.addEventListener("keydown", (e) => {
  if (e.key.toLowerCase() === "r") { restart(); return; }
  if (phase !== "quiz") {
    if (e.key === "Enter" && phase === "start") startQuiz();
    return;
  }
  if (["1","2","3","4"].includes(e.key)) {
    selectOption(parseInt(e.key) - 1);
  } else if (e.key === "Enter" && answered) {
    nextQuestion();
  }
});

// ---------- INIT ----------
renderStart();
</script>
</body>
</html>
